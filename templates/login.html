{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Login</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password"
                       class="form-control"
                       id="password"
                       name="password"
                       required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="mt-3">
            Don't have an account? <a href="{{ url_for("register_page") }}">Register here</a>
        </p>
        <p class="mt-2">
            <a href="{{ url_for("forgot_password_page") }}">Forgot password?</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
      import { getErrorMessage, showModal, hideModal } from '/static/js/utils.js';
   
      const loginForm = document.getElementById('loginForm');

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const formData = new FormData(loginForm);

        try {
          // OAuth2PasswordRequestForm expects form data, not JSON
          const response = await fetch('/api/users/token', {
            method: 'POST',
            body: formData,
          });

          if (response.ok) {
            const data = await response.json();

            if (data.access_token != "") {

                // Store token in localStorage
                localStorage.setItem('access_token', data.access_token);

                // Show success modal and redirect to home
                document.getElementById('successMessage').textContent =
                  'Login successful!';
                showModal('successModal');

                document.getElementById('successModal').addEventListener('hidden.bs.modal', () => {
                  window.location.href = '/';
                }, { once: true });
            }
            else {
              // No data access token . Probably account is locked or unverified.
              if (data.account_status == 1) {
                //document.getElementById('errorMessage').textContent =
                //    'Account is pending verification. Please Check your email to verify your account <br>' + data.resend_email_link;

                  const useremail = formData.get('username');
                  document.getElementById('errorMessage').innerHTML =
                        `Account is pending verification.<br> Please Check your email to verify your account <br> <a onclick="resendActivationLink('${useremail}')" href="javascript:void(0)">Resend Email</a>`;
                showModal('errorModal');
              }

            }

          } else {
            const error = await response.json();
            document.getElementById('errorMessage').textContent = getErrorMessage(error);
            showModal('errorModal');
          }
        } catch (error) {
          document.getElementById('errorMessage').textContent =
            'Network error. Please check your connection and try again.';
          showModal('errorModal');
        }
      });
      
      async function resendActivationLink(user_email) {

        try {
          const response = await fetch('/api/account_access/account_verification_request', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({"user_email": user_email}),
          });
          hideModal('errorModal');

          if (response.ok) {
            const data = await response.json();
            document.getElementById('successMessage').textContent = data.message;
            showModal('successModal');
          } else {
            const error = await response.json();
            document.getElementById('errorMessage').textContent = getErrorMessage(error);
            showModal('errorModal');
          }
        } catch (error) {
          document.getElementById('errorMessage').textContent =
            'Network error. Please check your connection and try again.';
          showModal('errorModal');
        }
      }
      
    // Add this function in global scope otherwise it will not be called from inline onclick in the error message.
    window.resendActivationLink = resendActivationLink;
      
    </script>
{% endblock scripts %}
