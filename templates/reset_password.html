{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Reset Password</h2>
        <form id="resetPasswordForm" method="POST">
            <div class="mb-3">
                <label for="password" class="form-label">New Password</label>
                <input type="password" class="form-control" id="password" name="password" required minlength="8">
                <small class="form-text text-muted">Minimum 8 characters</small>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="8">
            </div>
            <div id="passwordError" class="text-danger d-none">Passwords do not match.</div>
            <button type="submit" class="btn btn-primary">Reset Password</button>
        </form>
        <p class="mt-3">
            <a href="{{ url_for("login_page") }}">Back to Login</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
      import { getErrorMessage, showModal } from '/static/js/utils.js';

      const resetPasswordForm = document.getElementById('resetPasswordForm');
      const passwordInput = document.getElementById('password');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordError = document.getElementById('passwordError');


      // Check passwords match on input
      confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
          passwordError.classList.remove('d-none');
          confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
          passwordError.classList.add('d-none');
          confirmPasswordInput.setCustomValidity('');
        }
      });

      resetPasswordForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;


        if (password !== confirmPassword) {
          document.getElementById('errorMessage').textContent = 'Passwords do not match.';
          passwordError.classList.remove('d-none');
          return;
        }

        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
          document.getElementById('errorMessage').textContent = 'Invalid or missing reset token.';
          showModal('errorModal');
          return;
        }
        resetPasswordForm.submit();

      });
    </script>
{% endblock scripts %}
