{% extends "layout.html" %}
{% block content %}
    <div class="content-section py-3 px-4 mb-4">
        <h2 class="mb-4">Reset Password</h2>
        <form id="resetPasswordForm">
            <div class="mb-3">
                <label for="newPassword" class="form-label">New Password</label>
                <input type="password" class="form-control" id="newPassword" name="newPassword" required minlength="8">
                <small class="form-text text-muted">Minimum 8 characters</small>
            </div>
            <div class="mb-3">
                <label for="confirmPassword" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required minlength="8">
            </div>
            <div id="passwordError" class="text-danger d-none">Passwords do not match.</div>
            <button type="submit" id="submitBtn" class="btn btn-primary">Reset Password</button>
        </form>
        <p class="mt-3">
            <a href="{{ url_for("login_page") }}">Back to Login</a>
        </p>
    </div>
{% endblock content %}
{% block scripts %}
    <script type="module">
      import { getErrorMessage, showModal } from '/static/js/utils.js';

      const resetPasswordForm = document.getElementById('resetPasswordForm');
      const passwordInput = document.getElementById('newPassword');
      const confirmPasswordInput = document.getElementById('confirmPassword');
      const passwordError = document.getElementById('passwordError');


      // Check passwords match on input
      confirmPasswordInput.addEventListener('input', () => {
        if (passwordInput.value !== confirmPasswordInput.value) {
          passwordError.classList.remove('d-none');
          confirmPasswordInput.setCustomValidity('Passwords do not match');
        } else {
          passwordError.classList.add('d-none');
          confirmPasswordInput.setCustomValidity('');
        }
      });
      

      const submitBtn = document.getElementById('submitBtn');
      resetPasswordForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        
        // Extract token from URL query parameter
        const token = new URLSearchParams(window.location.search).get('token');
        if (!token) {
          document.getElementById('errorMessage').textContent = 'Invalid or missing reset token.';
          showModal('errorModal');
          return;
        }

        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
          document.getElementById('errorMessage').textContent = 'Passwords do not match.';
          passwordError.classList.remove('d-none');
          return;
        }
          
        submitBtn.disabled = true;
        submitBtn.textContent = 'Resetting...';
        try {
          const response = await fetch('/api/account_access/reset-password', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
              token: token,
              new_password: newPassword,
            }),
          });

          if (response.ok) {
            const resp_data = await response.json();
            document.getElementById('successMessage').textContent = resp_data.message;
            showModal('successModal');

            // Redirect to login after modal is hidden
            document.getElementById('successModal').addEventListener('hidden.bs.modal', () => {
                window.location.href = '/login';
            }, {once: true});
          } else {
            const error = await response.json();
            document.getElementById('errorMessage').textContent = getErrorMessage(error);
            showModal('errorModal');

            // If token is invalid/expired, suggest requesting new one
            if (response.status === 400) {
              document.getElementById('errorMessage').textContent +=
                ' Please request a new password reset.';
            }
          }
        } catch (error) {
          document.getElementById('errorMessage').textContent =
            'Network error. Please check your connection and try again.';
          showModal('errorModal');
        } finally {
          // Re-enable button
          submitBtn.disabled = false;
          submitBtn.textContent = 'Reset Password';
        }



      });
    </script>
{% endblock scripts %}
